<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unify Management</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#2563eb;--brand-d:#1d4ed8;--brand-light:#eff6ff;--brand-border:#bfdbfe;--green:#059669;--green-light:#ecfdf5;--amber:#d97706;--amber-light:#fffbeb;--red:#dc2626;--red-light:#fef2f2;--violet:#7c3aed;--violet-light:#f5f3ff;--slate:#64748b;--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--border2:#f1f5f9;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--r:8px;--rl:12px;--rxl:16px;--shadow:0 1px 3px rgba(0,0,0,.06)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:700}
::-webkit-scrollbar{width:5px;height:8px}::-webkit-scrollbar-track{background:#e2e8f0;border-radius:99px}::-webkit-scrollbar-thumb{background:#64748b;border-radius:99px;border:1px solid #e2e8f0}::-webkit-scrollbar-thumb:hover{background:#334155}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Inter',sans-serif;transition:all .15s}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn-primary:hover{background:var(--brand-d)}.btn-primary:disabled,.btn:disabled{opacity:.5;cursor:not-allowed}.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-sm{padding:5px 10px;font-size:12px}.btn-ghost{border:none;background:transparent;color:var(--text3)}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border .15s,box-shadow .15s}.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.1)}.input::placeholder{color:var(--text3)}.input:disabled{background:var(--bg);cursor:not-allowed}
select.input{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 8px center;background-repeat:no-repeat;background-size:16px;padding-right:32px}
.label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
textarea.input{resize:vertical;min-height:70px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.b-pending{background:#f1f5f9;color:var(--slate)}.b-progress{background:var(--brand-light);color:var(--brand)}.b-review{background:var(--amber-light);color:var(--amber)}.b-approved{background:var(--green-light);color:var(--green)}.b-issued{background:var(--violet-light);color:var(--violet)}.b-rejected{background:var(--red-light);color:var(--red)}.b-admin{background:var(--brand-light);color:var(--brand)}.b-bim{background:#f0fdf4;color:#15803d}.b-spec{background:#f1f5f9;color:var(--slate)}
.code-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--brand-light);color:var(--brand);padding:2px 7px;border-radius:5px;border:1px solid var(--brand-border);white-space:nowrap}
.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}.tbl td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:middle}.tbl tbody tr:hover td{background:#fafbfc}.tbl tbody tr:last-child td{border-bottom:none}
.prog-track{height:6px;background:var(--border2);border-radius:99px;overflow:hidden}.prog-fill{height:100%;border-radius:99px;background:var(--brand);transition:width .5s}
.toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}.toggle input{opacity:0;width:0;height:0}.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:99px;transition:.2s}.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}.toggle input:checked + .toggle-slider{background:var(--green)}.toggle input:checked + .toggle-slider:before{transform:translateX(16px)}
.perm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}.perm-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border2)}.perm-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--brand);background:var(--brand-light);flex-shrink:0}.perm-user-info{flex:1;min-width:0}.perm-name{font-size:13px;font-weight:600;color:var(--text)}.perm-email{font-size:10px;color:var(--text3)}.perm-body{display:grid;grid-template-columns:1fr 1fr}.perm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border2)}.perm-item:nth-child(odd){border-right:1px solid var(--border2)}.perm-item-label{font-size:11px;color:var(--text2);font-weight:500}
/* LOGIN */

.login-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:var(--rxl);padding:36px;width:100%;max-width:400px}
.login-logo{width:48px;height:48px;background:var(--brand);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#fff;text-align:center}.login-sub{font-size:10px;color:rgba(255,255,255,.35);text-align:center;text-transform:uppercase;letter-spacing:.12em;margin-bottom:28px;font-family:'JetBrains Mono',monospace}
.login-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.login-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border .15s;margin-bottom:14px}.login-input:focus{border-color:rgba(99,153,255,.6);box-shadow:0 0 0 3px rgba(37,99,235,.2)}.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;padding:11px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;margin-top:4px}.login-btn:hover{background:var(--brand-d)}.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;border-radius:var(--r);padding:10px 12px;font-size:12px;margin-bottom:12px;display:none;line-height:1.5}
/* PROJECT SELECTOR */
#project-selector{min-height:100vh;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%)}
.proj-sel-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:var(--rxl);padding:36px;width:100%;max-width:560px}
.proj-sel-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.proj-sel-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:24px}
.proj-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--rl);margin-bottom:8px;cursor:pointer;transition:all .15s}
.proj-item:hover{background:rgba(255,255,255,.12);border-color:rgba(99,153,255,.5);transform:translateY(-1px)}
.proj-item-icon{width:42px;height:42px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-item-code{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#93c5fd}
.proj-item-name{font-size:14px;font-weight:600;color:#fff;margin-top:2px}
.proj-item-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.proj-item-arrow{margin-left:auto;color:rgba(255,255,255,.3);font-size:18px}
.proj-new-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(37,99,235,.15);border:1px dashed rgba(99,153,255,.4);border-radius:var(--rl);cursor:pointer;transition:all .15s;width:100%;color:rgba(255,255,255,.6);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;margin-top:4px}
.proj-new-btn:hover{background:rgba(37,99,235,.25);border-color:rgba(99,153,255,.6);color:#fff}
.proj-user-info{display:flex;align-items:center;gap:10px;padding:12px 0;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1)}
.proj-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.proj-user-name{font-size:13px;font-weight:600;color:#fff}
.proj-user-email{font-size:11px;color:rgba(255,255,255,.4)}
.proj-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;padding:4px 8px;border-radius:var(--r)}
.proj-logout:hover{color:#fff;background:rgba(255,255,255,.08)}
/* APP */
#app{display:none;height:100vh;overflow:hidden}.shell{display:flex;height:100%}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100%;overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:52px}
.sidebar.collapsed .sb-logo-inner .sb-title,.sidebar.collapsed .sb-logo-inner .sb-sub{display:none}
.sidebar.collapsed .sb-proj{display:none}
.sidebar.collapsed .sb-section{display:none}
.sidebar.collapsed .sb-item span,.sidebar.collapsed .sb-item-label{display:none}
.sidebar.collapsed .sb-item{justify-content:center;padding:10px 0}
.sidebar.collapsed .sb-item svg{opacity:.7;width:18px;height:18px}
.sidebar.collapsed .sb-user-inner .sb-uname,.sidebar.collapsed .sb-user-inner .badge{display:none}
.sidebar.collapsed .sb-logout span,.sidebar.collapsed .sb-logout-label{display:none}
.sidebar.collapsed .sb-logout{justify-content:center;padding:8px 0}
.sidebar.collapsed .sb-collapse-btn .sb-collapse-icon{transform:rotate(180deg)}
.sidebar.collapsed .sb-item{position:relative}
.sidebar.collapsed .sb-item:hover::after{content:attr(title);position:absolute;left:52px;top:50%;transform:translateY(-50%);background:var(--text);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:999;pointer-events:none}
.sb-collapse-btn:hover{background:var(--bg)!important}
.sb-item-label{white-space:nowrap;overflow:hidden}
.sb-logo{padding:12px 14px;border-bottom:1px solid var(--border2)}.sb-logo-inner{display:flex;align-items:center;gap:10px}.sb-mark{width:32px;height:32px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.sb-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--text)}.sb-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-proj{margin:8px 10px 4px;padding:8px 10px;background:var(--brand-light);border-radius:var(--r);border:1px solid var(--brand-border);cursor:pointer;transition:background .15s}
.sb-proj:hover{background:#dbeafe}
.sb-proj-inner{display:flex;align-items:center;gap:8px}
.sb-proj-code{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--brand)}.sb-proj-name{font-size:10px;color:#1e40af;line-height:1.3;margin-top:1px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-proj-change{font-size:9px;color:var(--brand);opacity:.7;flex-shrink:0}
.sb-nav{flex:1;padding:8px;overflow-y:auto}.sb-section{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif}.sb-item:hover{background:var(--bg);color:var(--text)}.sb-item.active{background:var(--brand-light);color:var(--brand)}.sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:.6}.sb-item.active svg{opacity:1}
.sb-user{padding:10px;border-top:1px solid var(--border2)}.sb-user-inner{display:flex;align-items:center;gap:8px;padding:6px 8px}.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--brand);flex-shrink:0}.sb-uname{font-size:12px;font-weight:600;color:var(--text)}.sb-logout{display:flex;align-items:center;gap:6px;padding:6px 8px;font-size:11px;color:var(--red);cursor:pointer;border-radius:var(--r);border:none;background:none;width:100%;font-family:'Inter',sans-serif;margin-top:2px}.sb-logout:hover{background:var(--red-light)}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;background:var(--surface)}.topbar-bread{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}.topbar-bread span{color:var(--text2);font-weight:500}.topbar-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}.content{flex:1;overflow-y:auto;overflow-x:auto;padding:20px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}.page-title{font-size:22px;color:var(--text)}.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.kpi{padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);display:flex;align-items:flex-start;gap:12px}.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.kpi-icon svg{width:18px;height:18px}.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}.kpi-value{font-size:24px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--text);line-height:1.1;margin-top:2px}.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}.modal{background:var(--surface);border-radius:var(--rxl);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}.modal-lg{max-width:820px}.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.modal-title{font-size:16px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--text)}.modal-body{overflow-y:auto;flex:1;padding:20px}.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;background:var(--bg);border-radius:0 0 var(--rxl) var(--rxl)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-grid .full{grid-column:1/-1}.form-group{display:flex;flex-direction:column}
.code-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:16px}.cp-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}.cp-code{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--brand)}.cp-ok{color:var(--green);font-size:10px}.cp-dup{color:var(--red);font-size:10px}
.schema-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}.schema-order{width:22px;height:22px;border-radius:50%;background:var(--brand-light);color:var(--brand);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}.schema-info{flex:1;min-width:0}.schema-name{font-size:13px;font-weight:600;color:var(--text)}.schema-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}.schema-key{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg);padding:1px 5px;border-radius:4px;border:1px solid var(--border)}.schema-type-badge{font-size:9px;color:var(--text3);background:var(--bg);padding:1px 6px;border-radius:99px;border:1px solid var(--border)}.code-seg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--brand);background:var(--brand-light);padding:1px 6px;border-radius:4px;border:1px solid var(--brand-border)}.val-pill{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:4px;background:var(--brand-light);color:var(--brand);border:1px solid var(--brand-border)}.schema-vals{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.stat-bar-label{width:80px;font-size:11px;color:var(--text2)}.stat-bar-track{flex:1;height:7px;background:var(--border2);border-radius:99px;overflow:hidden}.stat-bar-fill{height:100%;border-radius:99px;transition:width .5s}.stat-bar-count{width:24px;text-align:right;font-size:11px;color:var(--text3);font-weight:600}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}.prog-label{width:110px;font-size:11px;color:var(--text2);font-weight:500;flex-shrink:0}.prog-bar-wrap{flex:1}.prog-pct{width:36px;font-size:11px;color:var(--text3);text-align:right;flex-shrink:0}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;text-align:center}.empty-icon{width:52px;height:52px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;margin-bottom:14px}.empty-icon svg{width:24px;height:24px;color:var(--text3)}.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px}.empty-desc{font-size:12px;color:var(--text3);max-width:280px;margin-bottom:14px}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);gap:10px;font-size:13px}.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;transform:translateY(60px);transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}.toast.show{transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* MIDP scroll table */
.midp-outer{border-radius:var(--rl);border:1px solid var(--border);background:var(--surface)}
.midp-scroll{overflow-x:scroll;overflow-y:visible;display:block;width:100%;scrollbar-width:thick;scrollbar-color:#334155 #e2e8f0}
.midp-scroll::-webkit-scrollbar{height:14px;display:block}
.midp-scroll::-webkit-scrollbar-track{background:#e2e8f0}
.midp-scroll::-webkit-scrollbar-thumb{background:#334155;border-radius:6px;border:3px solid #e2e8f0}
.midp-scroll::-webkit-scrollbar-thumb:hover{background:#0f172a}
.midp-tbl{border-collapse:separate;border-spacing:0;font-size:12px}
.midp-tbl th{padding:5px 8px;text-align:left;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.midp-tbl td{padding:7px 8px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:middle;white-space:nowrap}
.midp-tbl tbody tr:last-child td{border-bottom:none}
.midp-tbl tbody tr:hover td{background:#f8fafc}
.midp-tbl tbody tr:hover .scol{background:#f1f5f9}
.scol{position:sticky;z-index:3;background:var(--surface);box-shadow:2px 0 4px rgba(0,0,0,.08)}
.midp-tbl thead .scol{background:var(--bg);z-index:5}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <h1 class="login-title">Unify</h1>
    <p class="login-sub">Management Platform &middot; ISO 19650</p>
    <div class="login-error" id="login-error"></div>
    <label class="login-label">Correo electronico</label>
    <input type="email" id="login-email" class="login-input" placeholder="usuario@empresa.com" autocomplete="email">
    <label class="login-label">Contrasena</label>
    <input type="password" id="login-pass" class="login-input" placeholder="********" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="handleLogin()">Iniciar sesion</button>
  </div>
</div>

<!-- PROJECT SELECTOR -->
<div id="project-selector">
  <div class="proj-sel-card">
    <div class="proj-user-info">
      <div class="proj-avatar" id="ps-avatar">U</div>
      <div>
        <div class="proj-user-name" id="ps-name">Usuario</div>
        <div class="proj-user-email" id="ps-email">email</div>
      </div>
      <button class="proj-logout" onclick="doLogout()">Cerrar sesion</button>
    </div>
    <div class="proj-sel-title">Selecciona un proyecto</div>
    <div class="proj-sel-sub">Accede a los proyectos en los que participas</div>
    <div id="ps-projects"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-logo" style="padding:10px 10px 8px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="sb-logo-inner" style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">
            <div class="sb-mark" style="flex-shrink:0"><svg viewBox="0 0 24 24" fill="white" width="16" height="16"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            <div style="min-width:0;overflow:hidden"><div class="sb-title" style="white-space:nowrap;font-size:13px">Unify</div><div class="sb-sub" style="white-space:nowrap">Management</div></div>
          </div>
          <button class="sb-collapse-btn" onclick="toggleSidebar()" title="Colapsar menu" style="background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--text3);flex-shrink:0;display:flex;align-items:center;transition:background .15s">
            <svg class="sb-collapse-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="transition:transform .25s"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>
      </div>
      <div class="sb-proj" onclick="goToProjectSelector()" title="Cambiar proyecto" style="margin:6px 8px 2px">
        <div class="sb-proj-inner" style="display:flex;align-items:center;gap:6px">
          <div style="min-width:0;flex:1;overflow:hidden">
            <div class="sb-proj-code" id="sb-proj-code" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">--</div>
            <div class="sb-proj-name" id="sb-proj-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px">Cargando...</div>
          </div>
          <div class="sb-proj-change" style="flex-shrink:0">&#8646;</div>
        </div>
      </div>
      <nav class="sb-nav">
        <div class="sb-section">Gestion</div>
        <button class="sb-item active" onclick="nav('deliverables',this)" title="Entregables"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg><span class="sb-item-label">Entregables</span></button>
        <button class="sb-item" id="sb-packages" onclick="nav('packages',this)" title="Paquetes" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><span class="sb-item-label">Paquetes</span></button>
        <button class="sb-item" onclick="nav('progress',this)" title="Control de avance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span class="sb-item-label">Control de avance</span></button>
        <div class="sb-section">Administracion</div>
        <button class="sb-item" onclick="nav('schemas',this)" title="Config. de campos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="8" y="14" width="7" height="7" rx="1"/></svg><span class="sb-item-label">Config. de campos</span></button>
        <button class="sb-item" id="sb-users" onclick="nav('users',this)" title="Usuarios y permisos" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="sb-item-label">Usuarios y permisos</span></button>
        <button class="sb-item" id="sb-projects" onclick="nav('projects',this)" title="Proyectos" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span class="sb-item-label">Proyectos</span></button>
      </nav>
      <div class="sb-user">
        <div class="sb-user-inner">
          <div class="sb-avatar" id="sb-avatar">A</div>
          <div><div class="sb-uname" id="sb-uname">--</div><span class="badge b-admin" id="sb-role-badge">Admin</span></div>
        </div>
        <button class="sb-logout" onclick="doLogout()" title="Cerrar sesion"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span class="sb-logout-label">Cerrar sesion</span></button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="topbar-bread"><span class="online-dot"></span>ISO 19650 &rsaquo; <span id="bread-title">Entregables</span></div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-container"></div>
<script src="app.js?v=1774766684"></script>
</body>
</html>
