<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDP BIM Platform — ISO 19650</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#2563eb;--brand-d:#1d4ed8;--brand-light:#eff6ff;--brand-border:#bfdbfe;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --violet:#7c3aed;--violet-light:#f5f3ff;
  --slate:#64748b;
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--border2:#f1f5f9;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --r:8px;--rl:12px;--rxl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:-.02em}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;font-family:'Inter',sans-serif}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:var(--brand-d)}
.btn-primary:disabled,.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{border:none;background:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface);transition:border .15s,box-shadow .15s;outline:none}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.input::placeholder{color:var(--text3)}
.input:disabled{background:var(--bg);color:var(--text3);cursor:not-allowed}
select.input{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 8px center;background-repeat:no-repeat;background-size:16px;padding-right:32px}
.label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
textarea.input{resize:vertical;min-height:70px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.b-pending{background:#f1f5f9;color:var(--slate)}
.b-progress{background:var(--brand-light);color:var(--brand)}
.b-review{background:var(--amber-light);color:var(--amber)}
.b-approved{background:var(--green-light);color:var(--green)}
.b-issued{background:var(--violet-light);color:var(--violet)}
.b-rejected{background:var(--red-light);color:var(--red)}
.b-admin{background:var(--brand-light);color:var(--brand)}
.b-bim{background:#f0fdf4;color:#15803d}
.b-spec{background:#f1f5f9;color:var(--slate)}
.code-chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--brand-light);color:var(--brand);padding:2px 7px;border-radius:5px;border:1px solid var(--brand-border);white-space:nowrap}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border2);color:var(--text2);vertical-align:middle}
.tbl tbody tr:hover td{background:#fafbfc}
.tbl tbody tr:last-child td{border-bottom:none}
.prog-track{height:6px;background:var(--border2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--brand);transition:width .5s}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:99px;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked + .toggle-slider{background:var(--green)}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px)}
.toggle-label{font-size:12px;color:var(--text2);font-weight:500}

/* PERMISSION CARD */
.perm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:8px}
.perm-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border2)}
.perm-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--brand);background:var(--brand-light);flex-shrink:0}
.perm-user-info{flex:1;min-width:0}
.perm-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.perm-email{font-size:10px;color:var(--text3)}
.perm-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.perm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border2)}
.perm-item:nth-child(odd){border-right:1px solid var(--border2)}
.perm-item:last-child,.perm-item:nth-last-child(2):nth-child(odd){border-bottom:none}
.perm-item-label{font-size:11px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px}
.perm-icon{width:14px;height:14px;flex-shrink:0}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%);position:relative;overflow:hidden}
#login-page::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,.05) 1px,transparent 0);background-size:32px 32px}
.login-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:var(--rxl);padding:36px;width:100%;max-width:400px;position:relative;z-index:1}
.login-logo{width:48px;height:48px;background:var(--brand);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#fff;text-align:center;letter-spacing:-.03em}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);text-align:center;text-transform:uppercase;letter-spacing:.12em;margin-bottom:28px}
.login-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.login-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--r);color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border .15s;margin-bottom:14px}
.login-input:focus{border-color:rgba(99,153,255,.6);box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{width:100%;padding:11px;background:var(--brand);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;margin-top:4px}
.login-btn:hover{background:var(--brand-d)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;border-radius:var(--r);padding:8px 12px;font-size:12px;margin-bottom:12px;display:none}
.login-demo{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);text-align:center}
.login-demo p{font-size:11px;color:rgba(255,255,255,.25);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-demo code{font-size:12px;color:rgba(255,255,255,.45);display:block}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
.shell{display:flex;height:100%}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100%;overflow:hidden}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border2)}
.sb-logo-inner{display:flex;align-items:center;gap:10px}
.sb-mark{width:32px;height:32px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.sb-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.sb-proj{margin:10px 10px 4px;padding:8px 10px;background:var(--brand-light);border-radius:var(--r);border:1px solid var(--brand-border)}
.sb-proj-code{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--brand)}
.sb-proj-name{font-size:10px;color:#1e40af;line-height:1.3;margin-top:1px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.active{background:var(--brand-light);color:var(--brand)}
.sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.sb-item.active svg{opacity:1}
.sb-user{padding:10px;border-top:1px solid var(--border2)}
.sb-user-inner{display:flex;align-items:center;gap:8px;padding:6px 8px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--brand);flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;color:var(--text)}
.sb-logout{display:flex;align-items:center;gap:6px;padding:6px 8px;font-size:11px;color:var(--red);cursor:pointer;border-radius:var(--r);border:none;background:none;width:100%;font-family:'Inter',sans-serif;margin-top:2px}
.sb-logout:hover{background:var(--red-light)}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;background:var(--surface)}
.topbar-bread{font-size:12px;color:var(--text3)}
.topbar-bread span{color:var(--text2);font-weight:500}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:20px;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:22px;color:var(--text)}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);display:flex;align-items:flex-start;gap:12px}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:18px;height:18px}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.kpi-value{font-size:24px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--text);line-height:1.1;margin-top:2px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.filters{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)}
.search-wrap .input{padding-left:32px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:var(--rxl);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:720px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.modal-body{overflow-y:auto;flex:1;padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;background:var(--bg);border-radius:0 0 var(--rxl) var(--rxl)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column}
.code-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:16px}
.cp-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.cp-code{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--brand);letter-spacing:.03em}
.cp-ok{color:var(--green);font-size:10px}
.cp-dup{color:var(--red);font-size:10px}
.schema-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.schema-item:hover{border-color:var(--brand-border)}
.schema-order{width:22px;height:22px;border-radius:50%;background:var(--brand-light);color:var(--brand);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.schema-info{flex:1;min-width:0}
.schema-name{font-size:13px;font-weight:600;color:var(--text)}
.schema-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.schema-key{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);background:var(--bg);padding:1px 5px;border-radius:4px;border:1px solid var(--border)}
.schema-type-badge{font-size:9px;color:var(--text3);background:var(--bg);padding:1px 6px;border-radius:99px;border:1px solid var(--border)}
.code-seg{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--brand);background:var(--brand-light);padding:1px 6px;border-radius:4px;border:1px solid var(--brand-border)}
.val-pill{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 6px;border-radius:4px;background:var(--brand-light);color:var(--brand);border:1px solid var(--brand-border)}
.schema-vals{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.stat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stat-bar-label{width:80px;font-size:11px;color:var(--text2)}
.stat-bar-track{flex:1;height:7px;background:var(--border2);border-radius:99px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:99px;transition:width .5s}
.stat-bar-count{width:24px;text-align:right;font-size:11px;color:var(--text3);font-weight:600}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.prog-label{width:110px;font-size:11px;color:var(--text2);font-weight:500;flex-shrink:0}
.prog-bar-wrap{flex:1}
.prog-pct{width:36px;font-size:11px;color:var(--text3);text-align:right;flex-shrink:0}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;text-align:center}
.empty-icon{width:52px;height:52px;border-radius:14px;background:var(--bg);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty-icon svg{width:24px;height:24px;color:var(--text3)}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-desc{font-size:12px;color:var(--text3);max-width:280px;margin-bottom:14px}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);gap:10px;font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;transform:translateY(60px);transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* PERMISO BLOQUEADO */
.no-perm{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);background:var(--bg);padding:3px 8px;border-radius:99px;border:1px solid var(--border)}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1 class="login-title">MIDP</h1>
    <p class="login-sub">BIM Platform · ISO 19650</p>
    <div class="login-error" id="login-error"></div>
    <label class="login-label">Correo electrónico</label>
    <input type="email" id="login-email" class="login-input" placeholder="usuario@empresa.com" value="admin@midp.bim">
    <label class="login-label">Contraseña</label>
    <input type="password" id="login-pass" class="login-input" placeholder="••••••••" value="Admin@2025">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Iniciar sesión</button>
    <div class="login-demo">
      <p>Credenciales de demo</p>
      <code>admin@midp.bim / Admin@2025</code>
    </div>
  </div>
</div>

<div id="app">
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-inner">
          <div class="sb-mark">
            <svg viewBox="0 0 24 24" fill="white" width="16" height="16"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div><div class="sb-title">MIDP</div><div class="sb-sub">BIM · ISO 19650</div></div>
        </div>
      </div>
      <div class="sb-proj">
        <div class="sb-proj-code" id="sb-proj-code">—</div>
        <div class="sb-proj-name" id="sb-proj-name">Cargando...</div>
      </div>
      <nav class="sb-nav">
        <div class="sb-section">Gestión</div>
        <button class="sb-item active" onclick="nav('deliverables',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
          Entregables
        </button>
        <button class="sb-item" onclick="nav('progress',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Control de avance

        <button class="sb-item" onclick="nav('schemas',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="8" y="14" width="7" height="7" rx="1"/></svg>
          Config. de campos
        </button>
        <button class="sb-item" onclick="nav('users',this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

      <div class="sb-user">

</div>

<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════════
const SUPA_URL = 'https://rrzlwvqlzhmzyrramjcw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyemx3dnFsemhtenlycmFtamN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODIyMzYsImV4cCI6MjA5MDE1ODIzNn0.IeZlvcT1GaqQybZRbxyjgoEFfJ6Z6BVxbZRgLPzi2Fw';
const H = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Prefer':'return=representation'};

const sbGet    = async (t,p='')    => { const r=await fetch(`${SUPA_URL}/rest/v1/${t}${p}`,{headers:H}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbPost   = async (t,b)       => { const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbPatch  = async (t,f,b)     => { const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${f}`,{method:'PATCH',headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbDelete = async (t,f)       => { const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${f}`,{method:'DELETE',headers:{...H,'Prefer':'return=minimal'}}); if(!r.ok) throw new Error(await r.text()); };
const sbRpc    = async (fn,b)      => { const r=await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`,{method:'POST',headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); };

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const APP = { user:null, project:null, schemas:[], users:[], search:'', statusFilter:'' };

// ═══════════════════════════════════════════════════
// PERMISOS — verificación centralizada
// ═══════════════════════════════════════════════════
const DEFAULT_PERMS = {
  can_create_deliverables:false,
  can_edit_deliverables:false,
  can_delete_deliverables:false,
  can_change_status:false,
  can_register_progress:false
};

function can(action) {
  if (!APP.user) return false;
  // Admin siempre puede todo
  if (APP.user.role === 'admin') return true;
  const perms = APP.user.permissions || DEFAULT_PERMS;
  return !!perms[action];
}

const PERM_CONFIG = [
  { key:'can_create_deliverables', label:'Crear entregables',        icon:'<svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>' },
  { key:'can_edit_deliverables',   label:'Editar entregables',        icon:'<svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' },
  { key:'can_delete_deliverables', label:'Eliminar entregables',      icon:'<svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>' },
  { key:'can_change_status',       label:'Cambiar estado',            icon:'<svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>' },
  { key:'can_register_progress',   label:'Registrar avance',          icon:'<svg class="perm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>' },
];

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const STATUS_CFG = {
  pending:     {label:'Pendiente',   cls:'b-pending'},
  in_progress: {label:'En progreso', cls:'b-progress'},
  for_review:  {label:'En revisión', cls:'b-review'},
  approved:    {label:'Aprobado',    cls:'b-approved'},
  issued:      {label:'Emitido',     cls:'b-issued'},
  rejected:    {label:'Rechazado',   cls:'b-rejected'},
};
const ROLE_CFG = {
  admin:       {label:'Administrador',cls:'b-admin'},
  bim_manager: {label:'BIM Manager',  cls:'b-bim'},
  specialist:  {label:'Especialista', cls:'b-spec'},
};
const statusBadge = s => { const c=STATUS_CFG[s]||STATUS_CFG.pending; return `<span class="badge ${c.cls}">${c.label}</span>`; };
const roleBadge   = r => { const c=ROLE_CFG[r]||ROLE_CFG.specialist;  return `<span class="badge ${c.cls}">${c.label}</span>`; };
const fmtDate = d => d?new Date(d).toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}):'—';
const progColor = p => p>=80?'var(--green)':p>=50?'var(--brand)':'var(--amber)';
const initials  = n => (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const loading   = () => `<div class="loading"><div class="spinner"></div>Cargando desde Supabase...</div>`;

function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.className='toast',3000);
}
function closeModal(id){ document.getElementById(id)?.remove(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('modal-container').innerHTML=''; });

function buildCode(fields){
  const parts=APP.schemas.filter(s=>s.is_part_of_code&&s.is_active).sort((a,b)=>a.code_order-b.code_order);
  let code='';
  for(let i=0;i<parts.length;i++){
    const s=parts[i]; const v=fields[s.key];
    if(!v) continue;
    code+=String(v).substring(0,s.max_length);
    if(i<parts.length-1&&s.separator) code+=s.separator;
  }
  return code;
}

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  errEl.style.display='none'; btn.disabled=true; btn.textContent='Verificando...';
  try {
    const users=await sbGet('users',`?email=eq.${encodeURIComponent(email)}&is_active=eq.true&select=*`);
    if(!users.length) throw new Error('Correo o contraseña incorrectos.');
    const user=users[0];
    const isValid=await sbRpc('verify_password',{input_password:pass,stored_hash:user.password_hash});
    if(!isValid) throw new Error('Correo o contraseña incorrectos.');
    await sbPatch('users',`id=eq.${user.id}`,{last_login_at:new Date().toISOString()});
    APP.user=user;
    const projects=await sbGet('projects','?is_active=eq.true&order=created_at.asc&limit=1');
    APP.project=projects[0]||null;
    if(APP.project) APP.schemas=await sbGet('field_schemas',`?project_id=eq.${APP.project.id}&is_active=eq.true&order=code_order.asc`);
    APP.users=await sbGet('users','?select=*&order=full_name.asc');
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sb-avatar').textContent=initials(user.full_name);
    document.getElementById('sb-uname').textContent=user.full_name;
    const rc=ROLE_CFG[user.role]||ROLE_CFG.specialist;
    document.getElementById('sb-role-badge').className=`badge ${rc.cls}`;
    document.getElementById('sb-role-badge').textContent=rc.label;
    if(APP.project){ document.getElementById('sb-proj-code').textContent=APP.project.code; document.getElementById('sb-proj-name').textContent=APP.project.name; }
    nav('deliverables',document.querySelector('.sb-item'));
  } catch(err){
    errEl.textContent=err.message||'Error de conexión.'; errEl.style.display='block';
  } finally { btn.disabled=false; btn.textContent='Iniciar sesión'; }
}

function doLogout(){
  APP.user=null; APP.project=null; APP.schemas=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
}
document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
const BREAD={deliverables:'Entregables',progress:'Control de avance',schemas:'Configuración de campos',users:'Usuarios y permisos'};
function nav(view,el){
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('bread-title').textContent=BREAD[view]||view;
  ({deliverables:renderDeliverables,progress:renderProgress,schemas:renderSchemas,users:renderUsers})[view]?.();
}

// ═══════════════════════════════════════════════════
// DELIVERABLES
// ═══════════════════════════════════════════════════
async function renderDeliverables(){
  document.getElementById('topbar-actions').innerHTML=
    can('can_create_deliverables')
      ? `<button class="btn btn-primary btn-sm" onclick="openDeliverableModal()">+ Nuevo entregable</button>`
      : `<span class="no-perm">🔒 Sin permiso para crear</span>`;

  document.getElementById('content').innerHTML=`
  <div class="page-header">
    <div><h1 class="page-title">Entregables</h1><p class="page-sub">${APP.project?.name||'—'}</p></div>
    <button class="btn btn-sm" onclick="exportCSV()">↓ Exportar CSV</button>
  </div>
  <div class="kpi-grid" id="kpi-area"><div class="loading"><div class="spinner"></div></div></div>
  <div class="filters">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="input" placeholder="Buscar código o nombre..." oninput="APP.search=this.value;loadDeliverables()">
    </div>
    <select class="input" style="width:160px" onchange="APP.statusFilter=this.value;loadDeliverables()">
      <option value="">Todos los estados</option>
      ${Object.entries(STATUS_CFG).map(([v,c])=>`<option value="${v}">${c.label}</option>`).join('')}
    </select>
    <button class="btn btn-sm" onclick="loadDeliverables()">↺</button>
  </div>
  <div class="card" style="overflow:hidden" id="del-table">${loading()}</div>`;
  loadDeliverables();
}

async function loadDeliverables(){
  if(!APP.project) return;
  try {
    let params=`?project_id=eq.${APP.project.id}&is_active=eq.true&order=created_at.desc`;
    if(APP.statusFilter) params+=`&status=eq.${APP.statusFilter}`;
    if(APP.search) params+=`&or=(code.ilike.*${APP.search}*,name.ilike.*${APP.search}*)`;
    const [items,allSt,prod]=await Promise.all([
      sbGet('deliverables',params),
      sbGet('deliverables',`?project_id=eq.${APP.project.id}&is_active=eq.true&select=status`),
      sbGet('production_units','?select=deliverable_id,planned_qty,consumed_qty').catch(()=>[])
    ]);
    const total=allSt.length;
    const completed=allSt.filter(d=>['approved','issued'].includes(d.status)).length;
    const inprog=allSt.filter(d=>d.status==='in_progress').length;
    const pending=allSt.filter(d=>d.status==='pending').length;

    document.getElementById('kpi-area').innerHTML=`
      <div class="kpi"><div class="kpi-icon" style="background:var(--brand-light)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg></div><div><div class="kpi-label">Total</div><div class="kpi-value">${total}</div><div class="kpi-sub">en base de datos</div></div></div>
      <div class="kpi"><div class="kpi-icon" style="background:var(--green-light)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="kpi-label">Completados</div><div class="kpi-value" style="color:var(--green)">${completed}</div><div class="kpi-sub">${total?Math.round(completed/total*100):0}%</div></div></div>
      <div class="kpi"><div class="kpi-icon" style="background:var(--brand-light)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="kpi-label">En proceso</div><div class="kpi-value" style="color:var(--brand)">${inprog}</div></div></div>
      <div class="kpi"><div class="kpi-icon" style="background:#f1f5f9"><svg viewBox="0 0 24 24" fill="none" stroke="var(--slate)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="kpi-label">Pendientes</div><div class="kpi-value" style="color:var(--slate)">${pending}</div></div></div>`;

    const prodMap={};
    prod.forEach(p=>{ if(!prodMap[p.deliverable_id]) prodMap[p.deliverable_id]={plan:0,cons:0}; prodMap[p.deliverable_id].plan+=Number(p.planned_qty); prodMap[p.deliverable_id].cons+=Number(p.consumed_qty); });
    const userMap={};
    APP.users.forEach(u=>userMap[u.id]=u);

    const canEdit=can('can_edit_deliverables');
    const canDel=can('can_delete_deliverables');
    const canStatus=can('can_change_status');
    const showActions=canEdit||canDel||canStatus;

    document.getElementById('del-table').innerHTML=items.length===0
      ?`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div><div class="empty-title">Sin entregables</div><div class="empty-desc">Aún no hay entregables registrados.</div></div>`
      :`<div style="overflow-x:auto"><table class="tbl">
      <thead><tr>
        <th>Código</th><th>Nombre</th><th>Estado</th><th>Responsable</th>
        <th>Fecha plan.</th><th>Avance</th><th>Ver.</th>
        ${showActions?'<th style="text-align:right">Acciones</th>':''}
      </tr></thead>
      <tbody>
      ${items.map(d=>{
        const u=userMap[d.assigned_to];
        const p=prodMap[d.id]||{plan:0,cons:0};
        const pct=p.plan>0?Math.round(p.cons/p.plan*100):0;
        return `<tr>
          <td><span class="code-chip">${d.code}</span></td>
          <td><div style="max-width:220px"><div style="font-weight:600;color:var(--text);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div>${d.description?`<div style="font-size:10px;color:var(--text3)">${d.description}</div>`:''}</div></td>
          <td>
            ${canStatus
              ? `<select class="input" style="width:120px;font-size:11px;padding:3px 24px 3px 8px" onchange="changeStatus('${d.id}',this.value)">
                  ${Object.entries(STATUS_CFG).map(([v,c])=>`<option value="${v}" ${d.status===v?'selected':''}>${c.label}</option>`).join('')}
                </select>`
              : statusBadge(d.status)
            }
          </td>
          <td>${u?`<div><div style="font-size:11px;font-weight:600;color:var(--text)">${u.full_name}</div><div style="font-size:10px;color:var(--text3)">${u.specialty||''}</div></div>`:'<span style="color:var(--text3);font-size:11px">Sin asignar</span>'}</td>
          <td style="font-size:11px">${fmtDate(d.planned_date)}</td>
          <td><div style="display:flex;align-items:center;gap:6px"><div class="prog-track" style="width:52px"><div class="prog-fill" style="width:${pct}%;background:${progColor(pct)}"></div></div><span style="font-size:10px;color:var(--text3)">${pct}%</span></div></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)">v${d.version}</td>
          ${showActions?`<td><div style="display:flex;gap:4px;justify-content:flex-end">
            ${canEdit?`<button class="btn btn-ghost btn-sm" onclick="openDeliverableModal('${d.id}')" title="Editar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`:''}
            ${canDel?`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="confirmDelete('${d.id}','${d.code}')" title="Eliminar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>`:''}
          </div></td>`:''}
        </tr>`;
      }).join('')}
      </tbody></table></div>
      <div style="padding:8px 12px;background:var(--bg);font-size:10px;color:var(--text3);border-top:1px solid var(--border2)">${items.length} entregable(s) · Supabase en tiempo real</div>`;
  } catch(err){
    document.getElementById('del-table').innerHTML=`<div class="empty"><div class="empty-title">Error al cargar</div><div class="empty-desc">${err.message}</div></div>`;
  }
}

async function changeStatus(id, newStatus){
  if(!can('can_change_status')){ toast('Sin permiso para cambiar estado.','error'); return; }
  try {
    await sbPatch('deliverables',`id=eq.${id}`,{status:newStatus});
    toast('Estado actualizado.');
  } catch(err){ toast(err.message,'error'); }
}

// ── DELIVERABLE MODAL ──────────────────────────────
async function openDeliverableModal(id=null){
  if(id && !can('can_edit_deliverables')){ toast('Sin permiso para editar entregables.','error'); return; }
  if(!id && !can('can_create_deliverables')){ toast('Sin permiso para crear entregables.','error'); return; }
  const d=id?(await sbGet('deliverables',`?id=eq.${id}&limit=1`))[0]:null;

  const fieldInputs=APP.schemas.sort((a,b)=>a.code_order-b.code_order).map(s=>{
    const val=d?(d.field_values[s.key]||''):'';
    if(s.field_type==='dropdown'&&s.allowed_values){
      const opts=s.allowed_values.map(v=>`<option value="${v.value}" ${val===v.value?'selected':''}>${v.value} — ${v.label}</option>`).join('');
      return `<div class="form-group"><label class="label">${s.name}${s.is_required?'<span style="color:var(--red)"> *</span>':''} <span class="code-seg">cod.#${s.code_order}</span></label>
        <select class="input schema-field" data-key="${s.key}" onchange="updateCodePreview()"><option value="">— Seleccionar —</option>${opts}</select></div>`;
    }
    return `<div class="form-group"><label class="label">${s.name}${s.is_required?'<span style="color:var(--red)"> *</span>':''} ${s.is_part_of_code?`<span class="code-seg">cod.#${s.code_order}</span>`:''}</label>
      <input type="text" class="input schema-field" data-key="${s.key}" maxlength="${s.max_length}" value="${val}" oninput="updateCodePreview()"></div>`;
  }).join('');

  const usersOpts=APP.users.filter(u=>u.is_active).map(u=>`<option value="${u.id}" ${d&&d.assigned_to===u.id?'selected':''}>${u.full_name} (${u.specialty||u.role})</option>`).join('');

  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" id="del-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">${d?`Editar: ${d.code}`:'Nuevo entregable'}</div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('del-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="code-preview">
          <div class="cp-label"><span>Código generado automáticamente</span><span id="code-status"></span></div>

function updateCodePreview(excludeId=null){
  const fields={};
  document.querySelectorAll('.schema-field').forEach(el=>{ fields[el.dataset.key]=el.value; });
  const code=buildCode(fields);
  const preview=document.getElementById('code-preview-val');
  const status=document.getElementById('code-status');
  if(!preview) return;
  if(!code||code.length<4){ preview.textContent='Complete los campos...'; preview.style.color='var(--text3)'; if(status) status.innerHTML=''; return; }
  preview.textContent=code; preview.style.color='var(--brand)';
  if(status) status.innerHTML='<span style="color:var(--text3);font-size:10px">Verificando...</span>';
  clearTimeout(window._codeTimer);
  window._codeTimer=setTimeout(async()=>{
    try {
      let q=`?project_id=eq.${APP.project.id}&code=eq.${encodeURIComponent(code)}&is_active=eq.true`;
      if(excludeId) q+=`&id=neq.${excludeId}`;
      const res=await sbGet('deliverables',q);
      const dup=res.length>0;
      if(preview) preview.style.color=dup?'var(--red)':'var(--brand)';
      if(status) status.innerHTML=dup?'<span class="cp-dup">⚠ Código duplicado</span>':'<span class="cp-ok">✓ Disponible</span>';
    } catch{}
  },600);
}

async function saveDeliverable(id){
  const btn=document.getElementById('del-save-btn');
  const fields={};
  document.querySelectorAll('.schema-field').forEach(el=>{ fields[el.dataset.key]=el.value; });
  const name=document.getElementById('del-name').value.trim();
  if(!name){ toast('El nombre es obligatorio.','error'); return; }
  const code=buildCode(fields);
  if(!code){ toast('Completa los campos de código.','error'); return; }
  let dupQ=`?project_id=eq.${APP.project.id}&code=eq.${encodeURIComponent(code)}&is_active=eq.true`;
  if(id) dupQ+=`&id=neq.${id}`;
  const dup=await sbGet('deliverables',dupQ);
  if(dup.length>0){ toast('Código duplicado. Cambia los valores.','error'); return; }
  btn.disabled=true; btn.textContent='Guardando...';
  try {
    const payload={project_id:APP.project.id,code,name,description:document.getElementById('del-desc').value||null,status:document.getElementById('del-status').value,assigned_to:document.getElementById('del-assigned').value||null,planned_date:document.getElementById('del-planned').value||null,actual_date:document.getElementById('del-actual')?.value||null,field_values:fields,created_by:APP.user.id};
    if(id){ payload.version=((await sbGet('deliverables',`?id=eq.${id}&select=version`))[0]?.version||1)+1; await sbPatch('deliverables',`id=eq.${id}`,payload); toast('Entregable actualizado en Supabase.'); }
    else { await sbPost('deliverables',payload); toast('Entregable creado y guardado en Supabase.'); }
    closeModal('del-modal'); loadDeliverables();
  } catch(err){ toast(err.message,'error'); btn.disabled=false; btn.textContent=id?'Actualizar':'Crear entregable'; }
}

async function exportCSV(){
  try {
    const items=await sbGet('deliverables',`?project_id=eq.${APP.project.id}&is_active=eq.true&order=code.asc`);
    const headers=['Código','Nombre','Estado','Fecha Plan.','Versión',...APP.schemas.map(s=>s.name)];
    const rows=items.map(d=>[d.code,`"${d.name}"`,d.status,d.planned_date||'',d.version,...APP.schemas.map(s=>d.field_values[s.key]||'')]);
    const csv='\uFEFF'+[headers,...rows].map(r=>r.join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`MIDP_${APP.project.code}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
    toast('CSV exportado.');
  } catch(err){ toast(err.message,'error'); }
}

async function saveProgress(delId){
  const plan=parseInt(document.getElementById('prog-plan').value)||0;
  const cons=parseInt(document.getElementById('prog-cons').value)||0;
  if(cons>plan){ toast('Las unidades consumidas no pueden superar las planificadas.','error'); return; }
  try {
    const existing=await sbGet('production_units',`?deliverable_id=eq.${delId}&limit=1`);
    if(existing.length) await sbPatch('production_units',`deliverable_id=eq.${delId}`,{planned_qty:plan,consumed_qty:cons});
    else await sbPost('production_units',{deliverable_id:delId,planned_qty:plan,consumed_qty:cons,unit_label:'und'});
    closeModal('prog-modal'); toast('Avance guardado en Supabase.'); renderProgress();
  } catch(err){ toast(err.message,'error'); }
}

  const order=parseInt(document.getElementById('sch-order').value)||1;
  const sep=document.getElementById('sch-sep').value;
  const req=document.getElementById('sch-req').checked;
  const inCode=document.getElementById('sch-code').checked;
  const valsRaw=document.getElementById('sch-vals')?.value||'';
  const vals=type==='dropdown'&&valsRaw.trim()?valsRaw.split('\n').filter(Boolean).map(l=>{ const [v,...r]=l.split('|'); return {value:v.trim(),label:r.join('|').trim()||v.trim()}; }):null;
  const key=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  try {
    const payload={name,key,field_type:type,is_required:req,is_part_of_code:inCode,code_order:order,separator:sep,max_length:maxLen,allowed_values:vals,project_id:APP.project.id};
    if(id){ await sbPatch('field_schemas',`id=eq.${id}`,payload); toast('Campo actualizado.'); }
    else { await sbPost('field_schemas',payload); toast('Campo creado.'); }
    closeModal('sch-modal'); renderSchemas();
  } catch(err){ toast(err.message,'error'); }
}

function confirmDeleteSchema(id,name){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" id="sch-confirm">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><div class="modal-title">¿Eliminar campo?</div><button class="btn btn-ghost btn-sm" onclick="closeModal('sch-confirm')">✕</button></div>
      <div class="modal-body"><p style="font-size:13px;color:var(--text2)">¿Eliminar el campo <strong>${name}</strong>?</p></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('sch-confirm')">Cancelar</button>
        <button class="btn btn-danger" onclick="deleteSchema('${id}')">Eliminar</button>
      </div>
    </div>
  </div>`;
}

async function deleteSchema(id){
  try { await sbPatch('field_schemas',`id=eq.${id}`,{is_active:false}); closeModal('sch-confirm'); toast('Campo eliminado.'); renderSchemas(); }
  catch(err){ toast(err.message,'error'); }
}

// ═══════════════════════════════════════════════════
// USUARIOS Y PERMISOS
// ═══════════════════════════════════════════════════
async function renderUsers(){
  const isAdmin=APP.user?.role==='admin';
  document.getElementById('topbar-actions').innerHTML=isAdmin?`<button class="btn btn-primary btn-sm" onclick="openUserModal()">+ Nuevo usuario</button>`:'';
  document.getElementById('content').innerHTML=loading();
  try {
    APP.users=await sbGet('users','?select=*&order=full_name.asc');
    document.getElementById('content').innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title">Usuarios y permisos</h1><p class="page-sub">${APP.users.length} usuarios · El admin gestiona permisos individuales por usuario.</p></div>
      ${isAdmin?`<button class="btn btn-primary btn-sm" onclick="openUserModal()">+ Nuevo usuario</button>`:''}
    </div>
    ${APP.users.map(u=>{
      const perms=u.permissions||DEFAULT_PERMS;
      const isOwn=u.id===APP.user?.id;
      return `
      <div class="perm-card">
        <div class="perm-card-header">
          <div class="perm-avatar">${initials(u.full_name)}</div>
          <div class="perm-user-info">
            <div class="perm-name">${u.full_name} ${isOwn?'<span style="font-size:9px;color:var(--text3)">(tú)</span>':''}</div>
            <div class="perm-email">${u.email} · ${u.specialty||'—'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0">
            ${roleBadge(u.role)}
            ${u.is_active?'<span class="badge b-approved" style="font-size:9px">Activo</span>':'<span class="badge b-rejected" style="font-size:9px">Inactivo</span>'}
            ${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="openUserModal('${u.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`:''}
          </div>
        </div>
        <div class="perm-body">
          ${PERM_CONFIG.map(p=>{
            const isActive=u.role==='admin'?true:!!perms[p.key];
            const isAdminUser=u.role==='admin';
            return `
            <div class="perm-item">
              <div class="perm-item-label">${p.icon} ${p.label}</div>
              ${isAdminUser
                ? `<span style="font-size:10px;color:var(--green);font-weight:600">✓ Siempre</span>`
                : isAdmin
                  ? `<label class="toggle" title="${isActive?'Desactivar':'Activar'} permiso">
                      <input type="checkbox" ${isActive?'checked':''} onchange="togglePerm('${u.id}','${p.key}',this.checked)">
                      <span class="toggle-slider"></span>
                    </label>`
                  : `<span style="font-size:10px;font-weight:600;color:${isActive?'var(--green)':'var(--text3)'}">${isActive?'✓ Sí':'✗ No'}</span>`
              }
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}`;
  } catch(err){ document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-title">Error</div><div class="empty-desc">${err.message}</div></div>`; }
}

async function togglePerm(userId, permKey, value){
  if(APP.user?.role!=='admin'){ toast('Solo el administrador puede cambiar permisos.','error'); return; }
  try {
    const user=APP.users.find(u=>u.id===userId);
    const currentPerms=user?.permissions||{...DEFAULT_PERMS};
    currentPerms[permKey]=value;
    await sbPatch('users',`id=eq.${userId}`,{permissions:currentPerms});
    // Actualizar en APP.users local
    const idx=APP.users.findIndex(u=>u.id===userId);
    if(idx>=0) APP.users[idx].permissions=currentPerms;
    // Si es el usuario actual, actualizar APP.user
    if(userId===APP.user?.id) APP.user.permissions=currentPerms;
    toast(`Permiso "${permKey==='can_create_deliverables'?'Crear':permKey==='can_edit_deliverables'?'Editar':permKey==='can_delete_deliverables'?'Eliminar':permKey==='can_change_status'?'Cambiar estado':'Registrar avance'}" ${value?'activado':'desactivado'}.`);
  } catch(err){ toast(err.message,'error'); }
}

function openUserModal(id=null){
  const u=id?APP.users.find(x=>x.id===id):null;
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">${u?`Editar: ${u.full_name}`:'Nuevo usuario'}</div><button class="btn btn-ghost btn-sm" onclick="closeModal('user-modal')">✕</button></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group full"><label class="label">Nombre completo <span style="color:var(--red)">*</span></label><input type="text" class="input" id="u-name" value="${u?u.full_name:''}" placeholder="Juan Pérez López"></div>
          <div class="form-group full"><label class="label">Correo electrónico <span style="color:var(--red)">*</span></label><input type="email" class="input" id="u-email" value="${u?u.email:''}" placeholder="juan@empresa.com" ${u?'disabled':''}></div>
          ${!u?`<div class="form-group full"><label class="label">Contraseña temporal <span style="color:var(--red)">*</span></label><input type="password" class="input" id="u-pass" placeholder="Mínimo 8 caracteres"></div>`:''}
          <div class="form-group"><label class="label">Rol</label>
            <select class="input" id="u-role">
              <option value="specialist" ${u&&u.role==='specialist'?'selected':''}>Especialista</option>
              <option value="bim_manager" ${u&&u.role==='bim_manager'?'selected':''}>BIM Manager</option>
              <option value="admin" ${u&&u.role==='admin'?'selected':''}>Administrador</option>
            </select></div>
          <div class="form-group"><label class="label">Especialidad</label><input type="text" class="input" id="u-spec" value="${u?u.specialty||'':''}" placeholder="Arquitectura, MEP..."></div>
          <div class="form-group"><label class="label">Empresa</label><input type="text" class="input" id="u-comp" value="${u?u.company||'':''}" placeholder="Consorcio SDD"></div>
          <div class="form-group"><label class="label">Teléfono</label><input type="text" class="input" id="u-phone" value="${u?u.phone||'':''}" placeholder="+51 999 000 000"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('user-modal')">Cancelar</button>
        <button class="btn btn-primary" id="u-save-btn" onclick="saveUser('${id||''}')">
          ${u?'Actualizar usuario':'Crear usuario'}
        </button>
      </div>
    </div>
  </div>`;
}

async function saveUser(id){
  const btn=document.getElementById('u-save-btn');
  const name=document.getElementById('u-name').value.trim();
  if(!name){ toast('El nombre es obligatorio.','error'); return; }
  btn.disabled=true; btn.textContent='Guardando...';
  try {
    const payload={full_name:name,role:document.getElementById('u-role').value,specialty:document.getElementById('u-spec').value||null,company:document.getElementById('u-comp').value||null,phone:document.getElementById('u-phone').value||null};
    if(id){ await sbPatch('users',`id=eq.${id}`,payload); toast('Usuario actualizado.'); }
    else {
      const email=document.getElementById('u-email').value.trim();
      const pass=document.getElementById('u-pass').value;
      if(!email||!pass){ toast('Correo y contraseña son obligatorios.','error'); btn.disabled=false; btn.textContent='Crear usuario'; return; }
      const hash=await sbRpc('hash_password',{input_password:pass});
      const newPerms={...DEFAULT_PERMS};
      await sbPost('users',{...payload,email,password_hash:hash,is_active:true,permissions:newPerms});
      toast('Usuario creado. Permisos desactivados por defecto — actívalos en la pantalla de permisos.');
    }
    closeModal('user-modal'); renderUsers();
  } catch(err){ toast(err.message,'error'); btn.disabled=false; btn.textContent=id?'Actualizar':'Crear usuario'; }
}
</script>
